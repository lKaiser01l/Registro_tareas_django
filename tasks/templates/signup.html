{% extends 'base.html'%}

{% block content%}

<main class="container">
    <div class="row">
        <div class="col-md-4 offset-md-4 mt-5">

            <form method="post" class="card card-body">
                {% csrf_token %}
                <h1 class="text-center">Resgistrarse</h1>
                {{error}}
                <div class="mb-3">
                    <label for="username">Usuario:</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Ingrese su nombre de usuario">
                </div>
                <div class="mb-3">
                    <label for="password1">Contraseña:</label>
                    <input type="password" name="password1" id="password1" class="form-control" placeholder="Ingrese su contraseña">
                </div>
                <div class="mb-3">
                    <label for="password2">Username:</label>
                    <input type="password" name="password2" id="password2" class="form-control" placeholder="Confirme su contraseña">
                </div>

                {{error}}
                <button class="btn btn-dark">
                    Registrase
                </button>
        </div>

    </div>
    
    </form>

</main>

{% endblock %}
